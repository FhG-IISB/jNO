name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync --all-extras --no-extra cuda

    - name: Check formatting with black
      run: uv run black --check --line-length 250 jno/ tests/

    - name: Lint with ruff
      run: uv run ruff check jno/ tests/
