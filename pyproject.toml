[project]
name = "jNO"
version = "0.2.0"
description = "Jax Neural Operators"
readme = "README.md"
requires-python = ">=3.11,<=3.12.4"
authors = [{ name = "Leon Armbruster", email = "leonarmbruster@iisb.fraunhofer.de" }]

dependencies = [
    "jax>=0.4.38,<=0.8.1",
    "flax",
    "optax",
    "lox @ git+https://github.com/huterguier/lox",
    "soap_jax @ git+https://github.com/haydn-jones/SOAP_JAX",
    "jaxkan",
    "numpy",
    "matplotlib",
    "graphviz",
    "pygmsh",
    "cloudpickle",
    "nevergrad",
    "einops"
]

[project.optional-dependencies]
cuda = [
    "jax[cuda]>=0.4.38,<=0.8.1"
]
dev = ["pytest>=7.0", "black>=22.0", "flake8>=4.0", "mypy>=0.950"]

[tool.setuptools]
packages = ["jno"]

[tool.setuptools.package-data]
jno = ["py.typed"]

[tool.uv.workspace]
members = [
    ".",
]

[tool.uv.sources]
jno = { workspace = true}

[dependency-groups]
dev = [
    "jno",
]