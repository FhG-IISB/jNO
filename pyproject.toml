[project]
name = "jNO"
version = "0.2.0"
description = "Jax Neural Operators"
readme = "README.md"
authors = [{ name = "Leon Armbruster", email = "leonarmbruster@iisb.fraunhofer.de" }]

dependencies = [
    "jax",
    "equinox",
    "optax",
    "matplotlib",
    "graphviz",
    "pygmsh",
    "cloudpickle",
    "nevergrad",
    "einops"
]

[project.optional-dependencies]
cuda = [
    "jax[cuda]"
]
dev = ["pytest>=7.0", "black>=22.0", "flake8>=4.0", "mypy>=0.950"]
iree = [
    "iree-base-compiler",
    "iree-base-runtime"
]
foundation = [
    "jax_morph @git+https://github.com/armbrusl/jax_morph",
    "jax_mpp @git+https://github.com/armbrusl/jax_mpp"
]


[tool.setuptools]
packages = ["jno"]

[tool.setuptools.package-data]
jno = ["py.typed"]

[tool.uv.workspace]
members = [
    ".",
]

[tool.black]
line-length = 250

[tool.uv.sources]
jno = { workspace = true}

[dependency-groups]
dev = [
    "jno",
]