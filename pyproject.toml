[project]
name = "jNO"
version = "0.2.0"
description = "Jax Neural Operators"
readme = "README.md"
requires-python = ">=3.11, <3.14"
authors = [{ name = "Leon Armbruster", email = "leonarmbruster@iisb.fraunhofer.de" }]

dependencies = [
    "jax",
    "equinox",

    "maskx",
    "optax",

    "pygmsh",
    "cloudpickle",
    "einops",
]

[project.optional-dependencies]
cuda = [
    "jax[cuda12]"
]
dev = ["pytest>=7.0", 
"black>=22.0", 
"flake8>=4.0", 
"mypy>=0.950", 
"matplotlib", 
"paramax", 
"flax", 
"xprof", 
"pylotte", 
"nevergrad", 
"lineax", "jax-fem @git+https://github.com/FhG-IISB/jax-fem", "pyfiglet", "fenics-basix",]
iree = [
    "iree-base-compiler",
    "iree-base-runtime"
]
foundation = [
    "jax_morph @git+https://github.com/armbrusl/jax_morph",
    "jax_mpp @git+https://github.com/armbrusl/jax_mpp",
]
fem = [
    "lineax",
    "jax-fem @git+https://github.com/FhG-IISB/jax-fem",
     "pyfiglet", 
     "fenics-basix"
]


[tool.setuptools]

[tool.setuptools.packages.find]
where = ["."]
include = ["jno*"]

[tool.setuptools.package-data]
jno = ["py.typed"]

[tool.uv.workspace]
members = [
    ".",
]

[tool.black]
line-length = 250

[tool.uv.sources]
jno = { workspace = true}

[dependency-groups]
dev = [
    "jno",
]